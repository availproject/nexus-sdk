name: E2E Cron Test

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build and test"
        required: true
        default: main
        type: string

jobs:
  build-and-push:
    name: Build & push E2E image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}
          persist-credentials: false

      - name: Define DO registry
        id: registry
        run: echo "DO_REGISTRY=registry.digitalocean.com" >> $GITHUB_OUTPUT

      - name: Login to DigitalOcean Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ steps.registry.outputs.DO_REGISTRY }}
          username: ${{ secrets.DO_USER_EMAIL }}
          password: ${{ secrets.DO_USER_TOKEN }}

      - name: Compute image tag
        id: meta
        env:
          REGISTRY: ${{ steps.registry.outputs.DO_REGISTRY }}
          BRANCH: ${{ inputs.branch }}
        run: |
          REPO="${REGISTRY}/availj/nexus-e2e-cron"
          if [ "$BRANCH" = "main" ]; then
            echo "tag=${REPO}:latest" >> "$GITHUB_OUTPUT"
          else
            # Replace anything outside Docker's allowed tag charset with '-'.
            # Defends against newlines (which would inject extra GITHUB_OUTPUT
            # lines) and any other non-tag char an unusual ref could carry.
            SAFE_BRANCH="${BRANCH//[!a-zA-Z0-9_.-]/-}"
            # Short SHA from the actually-checked-out HEAD — github.sha can
            # diverge from inputs.branch under workflow_dispatch.
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "tag=${REPO}:${SAFE_BRANCH}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/tools/src/e2e/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            GITHUB_PAT=${{ secrets.GH_PAT }}
          tags: ${{ steps.meta.outputs.tag }}
