<!DOCTYPE html>
<html lang="en" data-palette="charm">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus SDK v2</title>
    <script>
      (() => {
        const palette = localStorage.getItem('nexus-theme') || 'charm';
        const mode = localStorage.getItem('nexus-mode') || 'dark';
        document.documentElement.dataset.palette = palette;
        if (mode === 'light') document.documentElement.dataset.theme = 'light';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
